<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TriageBot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <header class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between">
    <span class="font-bold text-lg">TriageBot</span>
    <div class="flex items-center gap-4 text-sm">
      <span class="text-slate-500">Hola, <strong>{{ user }}</strong></span>
      <a href="/logout" class="text-blue-600 hover:underline">Cerrar sesión</a>
    </div>
  </header>

  <main class="mx-auto max-w-6xl p-6 space-y-8">
    <p class="text-slate-600">Tablero de incidencias con clasificación automática por IA.</p>

    <!-- 1. Formulario -->
    <section class="bg-white rounded-lg shadow-sm ring-1 ring-slate-200 p-6">
      <h2 class="text-lg font-semibold mb-4">Crear ticket</h2>
      <form hx-post="/tickets"
            hx-ext="json-enc"
            hx-headers='{"Accept": "text/html"}'
            hx-target="#tickets-container"
            hx-swap="innerHTML"
            hx-on::after-request="this.reset()"
            class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1" for="title">Título</label>
          <input id="title" name="title" type="text" required
                 class="w-full rounded border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                 placeholder="Describe el problema en una línea">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1" for="description">Descripción</label>
          <textarea id="description" name="description" required rows="3"
                    class="w-full rounded border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Detalla el problema, pasos para reproducirlo, impacto…"></textarea>
        </div>
        <button type="submit"
                class="rounded bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
          Crear ticket
        </button>
      </form>
    </section>

    <!-- 2. Filtros -->
    <section>
      <form hx-get="/tickets"
            hx-headers='{"Accept": "text/html"}'
            hx-target="#tickets-container"
            hx-swap="innerHTML"
            hx-trigger="change, keyup changed delay:400ms from:[name='assignee_text']"
            class="flex flex-wrap gap-3 items-center">
        <select name="category"
                class="rounded border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">Todas las categorías</option>
          <option value="bug">Bug</option>
          <option value="feature_request">Feature request</option>
          <option value="question">Question</option>
          <option value="urgent">Urgent</option>
        </select>
        <select name="priority"
                class="rounded border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">Todas las prioridades</option>
          <option value="P1">P1</option>
          <option value="P2">P2</option>
          <option value="P3">P3</option>
        </select>
        <select name="status"
                class="rounded border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="open" selected>Abiertos</option>
          <option value="">Todos los estados</option>
          <option value="in_progress">En progreso</option>
          <option value="resolved">Resueltos</option>
          <option value="closed">Cerrados</option>
        </select>

        <!-- Campo de texto para filtrar por responsable (se deshabilita con el checkbox) -->
        <input id="assignee_text" name="assignee" type="text" placeholder="Filtrar por responsable"
               class="rounded border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">

        <!-- Solo mis tickets -->
        <label class="flex items-center gap-1.5 text-sm cursor-pointer select-none">
          <input type="checkbox" id="my_tickets"
                 class="rounded border-slate-300 text-blue-600 focus:ring-blue-500"
                 onchange="
                   const txt = document.getElementById('assignee_text');
                   if (this.checked) { txt.value = '{{ user }}'; txt.disabled = true; }
                   else { txt.value = ''; txt.disabled = false; }
                   htmx.trigger(txt.closest('form'), 'change');
                 ">
          Solo mis tickets
        </label>

        <!-- Solo vencidos -->
        <label class="flex items-center gap-1.5 text-sm cursor-pointer select-none">
          <input type="checkbox" name="overdue" value="1"
                 class="rounded border-slate-300 text-red-600 focus:ring-red-500">
          <span class="text-red-600 font-medium">⚠ Solo vencidos</span>
        </label>
      </form>
    </section>

    <!-- 3. Tablero -->
    <section id="tickets-container">
      {% include "_tickets_table.html" %}
    </section>

  </main>
</body>
</html>
