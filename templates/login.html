<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TriageBot — Iniciar sesión</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-lg shadow-sm ring-1 ring-slate-200 p-8 w-full max-w-sm space-y-6">
    <h1 class="text-2xl font-bold text-center">TriageBot</h1>
    <p class="text-slate-500 text-sm text-center">Selecciona tu nombre para entrar al tablero</p>

    {% if error %}
    <p class="rounded bg-red-50 border border-red-200 text-red-700 text-sm px-3 py-2">{{ error }}</p>
    {% endif %}

    <form method="post" action="/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1" for="name">Responsable</label>
        <select id="name" name="name" required
                class="w-full rounded border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">— Elige tu nombre —</option>
          {% for member in team %}
          <option value="{{ member }}">{{ member }}</option>
          {% endfor %}
        </select>
      </div>
      <button type="submit"
              class="w-full rounded bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
        Entrar
      </button>
    </form>
  </div>
</body>
</html>
